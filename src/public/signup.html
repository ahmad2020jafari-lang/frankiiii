<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Signup - TicTacToe</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>

    <div class="login-container">

        <h2>Create Account</h2>

        <form id="signupForm" enctype="multipart/form-data">

            <input name="username" placeholder="Username" required>

            <input name="email" type="email" placeholder="Email" required>

            <!-- <input name="password" type="password" placeholder="Password" required> -->

            <label class="file-label">Upload profile picture</label>

            <input id="profilePic" name="profilePic" type="file" accept="image/*" hidden>

            <button type="submit">Sign Up</button>
        </form>


        <br>

        <a href="/login.html" class="login-button-link">Back to Login</a>

    </div>

    <script>

        document.getElementById("signupForm").addEventListener("submit", async e => {

            e.preventDefault();

            const formData = new FormData(e.target);

            const res = await fetch("/signup", {
                method: "POST",
                body: formData
            });

            const data = await res.json();

            if (data.success) {

                alert("Account created!");
                window.location.href = "/login.html";

            } else {

                alert(data.message);

            }

        });

    </script>

</body>

</html>
