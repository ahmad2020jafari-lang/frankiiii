<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp - TicTacToe</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="login-container">
        <h2>Create Account</h2>

        <form id="signupForm" enctype="multipart/form-data">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>

            <label class="file-label">Upload profile picture</label>
            <div class="file-row">
                <button type="button" class="file-btn" onclick="document.getElementById('profilePic').click()">
                    Choose File
                </button>
                <span id="fileName">No file selected</span>
            </div>
            <input type="file" id="profilePic" name="profilePic" accept="image/*" style="display: none;">

            <button type="submit" class="btt-sub">Sign Up</button>
        </form>

        <a href="/login.html" class="login-button-link">Back to Login</a>
    </div>

    <script>
        // Display selected file name
        document.getElementById("profilePic").addEventListener("change", function (e) {
            const file = e.target.files[0];
            const fileNameSpan = document.getElementById("fileName");
            if (file) {
                fileNameSpan.textContent = file.name;
            } else {
                fileNameSpan.textContent = "No file selected";
            }
        });

        // Handle form submission
        document.getElementById("signupForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const formData = new FormData(this);

            try {
                const res = await fetch("/signup", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();

                if (data.success) {
                    alert("Account created! Check your email for the password.");
                    window.location.href = "/login.html";
                } else {
                    alert(data.message);
                }
            } catch (error) {
                console.error("Signup error:", error);
                alert("Server error. Please try again.");
            }
        });
    </script>
</body>

</html>
