<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TicTacToe</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="login-container">
        <h2>TicTacToe Login</h2>

        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="6 digit password from email" required>
            <button type="submit" class="btt-sub">Login</button>
        </form>

        <a href="/signup.html" class="login-button-link">Create Account</a>
    </div>

    <script>
        // Login form handling
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            try {
                const response = await fetch("/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem("username", data.username);
                    localStorage.setItem("profilePic", data.profilePic);
                    window.location.href = "/game.html";
                } else {
                    alert(data.message || "Login failed");
                }
            } catch (error) {
                console.error("Login error:", error);
                alert("Server error. Please try again.");
            }
        });
    </script>
</body>

</html>
