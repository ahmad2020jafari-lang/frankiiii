<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TicTacToe </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login-container">

        <h2>TicTacToe Login</h2>

        <form id="loginForm">
            <input id="username" placeholder="Username" required>
            <input id="password" type="password" placeholder="6 digit password from email" required>
            <button type="submit" class="btt-sub">Login</button>
        </form>
        <br>
        <a href="/signup.html" class="login-button-link">Create Account</a>
    </div>
</body>

</html>
